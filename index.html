<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riyadhul Badi'ah — Kitab Kuning Interaktif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@500;600;700&family=Karla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <p class="kitab-title">رياض البديعة</p>
      <p class="kitab-sub">Riyadhul Badi'ah</p>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Cari bab...">
      </div>
    </div>
    <ul class="chapter-list" id="chapterList"></ul>
    <div class="sidebar-footer">Madzhab Imam Syafi'i • Syekh Muhammad Nawawi al-Bantani</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Buka daftar bab">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="breadcrumb" id="breadcrumb">Daftar Bab</span>
    </div>

    <div class="content-scroll" id="contentScroll"></div>
  </main>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
