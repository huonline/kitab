<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Interaktif Kitab Kuning - Riyadhul Badi'ah</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Panggil File CSS Custom Kamu -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="theme-yellow h-full flex flex-col overflow-hidden">

    <!-- Navigation / Header Bar -->
    <header class="paper-card border-b px-4 py-3 flex items-center justify-between shadow-sm z-30 transition-colors duration-300">
        <div class="flex items-center space-x-3">
            <button id="toggleSidebar" class="p-2 rounded-lg hover:bg-black/5 transition focus:outline-none" title="Daftar Bab">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <div class="flex flex-col">
                <h1 class="text-lg font-bold tracking-tight">Riyadhul Badi'ah <span class="text-xs font-normal opacity-75">رياض البديعة</span></h1>
                <p class="text-[10px] opacity-60">Aplikasi Interaktif Makna Gandul Pesantren</p>
            </div>
        </div>

        <!-- Controls Toolbar -->
        <div class="flex items-center space-x-2">
            <button id="themeMenuBtn" class="p-2 rounded-lg hover:bg-black/5 transition relative" title="Ubah Tema Warna">
                <i class="fa-solid fa-palette text-lg"></i>
            </button>
            <button id="guideBtn" class="p-2 rounded-lg hover:bg-black/5 transition" title="Panduan Kode Makna">
                <i class="fa-solid fa-circle-question text-lg"></i>
            </button>
            <button id="settingsBtn" class="p-2 rounded-lg hover:bg-black/5 transition text-red-600 dark:text-red-400" title="Kustomisasi Tampilan">
                <i class="fa-solid fa-sliders text-lg"></i>
            </button>
        </div>
    </header>

    <!-- Theme Dropdown Popover -->
    <div id="themeDropdown" class="hidden absolute right-16 top-14 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl p-3 z-50 w-48 space-y-2 transition-all">
        <h4 class="text-xs font-semibold px-2 pb-1 border-b border-gray-100 dark:border-gray-700 text-gray-400">Pilih Warna Kertas</h4>
        <button onclick="setTheme('theme-yellow')" class="flex items-center space-x-3 w-full p-2 text-sm rounded-lg hover:bg-yellow-50 text-left">
            <span class="w-4 h-4 rounded-full bg-[#F3EAD3] border border-yellow-300"></span>
            <span class="font-medium">Kuning Kitab</span>
        </button>
        <button onclick="setTheme('theme-sepia')" class="flex items-center space-x-3 w-full p-2 text-sm rounded-lg hover:bg-amber-50 text-left">
            <span class="w-4 h-4 rounded-full bg-[#EFE6D5] border border-amber-300"></span>
            <span class="font-medium">Sepia Klasik</span>
        </button>
        <button onclick="setTheme('theme-light')" class="flex items-center space-x-3 w-full p-2 text-sm rounded-lg hover:bg-gray-100 text-left">
            <span class="w-4 h-4 rounded-full bg-white border border-gray-300"></span>
            <span class="font-medium">Putih Bersih</span>
        </button>
        <button onclick="setTheme('theme-dark')" class="flex items-center space-x-3 w-full p-2 text-sm rounded-lg hover:bg-gray-700 text-left">
            <span class="w-4 h-4 rounded-full bg-gray-900 border border-gray-800"></span>
            <span class="font-medium">Mode Gelap</span>
        </button>
    </div>

    <!-- Main Workspace Area -->
    <div class="flex-1 flex overflow-hidden relative">

        <!-- Sidebar / Drawer (Daftar Bab & Search) -->
        <aside id="sidebar" class="paper-card w-80 max-w-full border-r absolute md:relative inset-y-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col z-40 shadow-lg md:shadow-none">
            <div class="p-4 border-b border-black/10">
                <div class="relative">
                    <input type="text" id="chapterSearch" placeholder="Cari nama Bab / Fashl..." class="w-full pl-9 pr-4 py-2 text-sm rounded-lg bg-black/5 border border-transparent focus:border-red-500 focus:bg-transparent focus:ring-1 focus:ring-red-500 outline-none transition">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-xs opacity-50"></i>
                </div>
            </div>
            <div id="chapterList" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Chapters rendered here -->
            </div>
        </aside>

        <!-- Main Reading & Canvas Workspace -->
        <main class="flex-1 flex flex-col overflow-hidden relative">
            <!-- Active Customizer Bar (Settings Panel) -->
            <div id="settingsPanel" class="paper-card border-b p-4 hidden grid grid-cols-1 sm:grid-cols-3 gap-4 text-sm transition-all z-20 shadow-inner">
                <div class="flex flex-col justify-center space-y-2">
                    <span class="font-semibold opacity-75">Tampilan Teks Arab</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="toggleHarokat" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:height-5 after:width-5 after:transition-all peer-checked:bg-red-700"></div>
                        <span class="ml-3 text-xs font-medium">Tampilkan Harokat</span>
                    </label>
                </div>
                <div class="flex flex-col justify-center space-y-2">
                    <span class="font-semibold opacity-75">Tampilan Lugot (Gandul)</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="toggleLugot" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:height-5 after:width-5 after:transition-all peer-checked:bg-red-700"></div>
                        <span class="ml-3 text-xs font-medium">Tampilkan Makna</span>
                    </label>
                </div>
                <div class="flex flex-col justify-center space-y-2">
                    <span class="font-semibold opacity-75">Tipe Bahasa Lugot</span>
                    <div class="inline-flex rounded-lg p-0.5 bg-black/5" role="group">
                        <button id="btnPegon" onclick="setLugotStyle('pegon')" class="flex-1 py-1 px-3 text-xs rounded-md bg-white dark:bg-gray-800 font-semibold shadow-sm text-red-700 dark:text-red-400 focus:outline-none transition">Arab Pegon</button>
                        <button id="btnLatin" onclick="setLugotStyle('latin')" class="flex-1 py-1 px-3 text-xs rounded-md font-medium text-gray-500 hover:text-gray-900 focus:outline-none transition">Latin Sunda/Jawa</button>
                    </div>
                </div>
            </div>

            <!-- Book Reader Viewport -->
            <div class="flex-1 overflow-y-auto p-6 md:p-10 flex flex-col items-center justify-start relative">
                <div id="currentChapterBadge" class="mb-6 px-4 py-1.5 rounded-full bg-black/5 text-xs font-semibold tracking-wider uppercase border border-black/10 shadow-sm transition">
                    Mukadimah
                </div>
                <div id="kitabContentContainer" class="w-full max-w-4xl py-6 px-4 md:px-8 border border-transparent rounded-2xl flex flex-wrap gap-y-20 justify-end items-center text-right select-none arabic-text" style="direction: rtl;">
                    <!-- Content Words will render dynamically here -->
                </div>
                <div id="emptySearchPlaceholder" class="hidden absolute inset-0 flex flex-col items-center justify-center p-6 text-center opacity-65">
                    <i class="fa-solid fa-book-open text-5xl mb-4 text-red-500"></i>
                    <h3 class="font-bold text-lg">Bab Tidak Ditemukan</h3>
                    <p class="text-sm">Silakan gunakan kata kunci lain untuk mencari fashl kitab.</p>
                </div>
            </div>

            <!-- Text Size adjust -->
            <div class="absolute bottom-4 right-4 flex items-center space-x-1.5 bg-white/90 backdrop-blur border border-gray-200 px-3 py-1.5 rounded-full shadow-lg z-30">
                <button onclick="adjustFontSize(-2)" class="w-8 h-8 rounded-full hover:bg-black/5 flex items-center justify-center text-xs font-bold" title="Kecilkan Huruf">A-</button>
                <div class="w-[1px] h-4 bg-gray-300"></div>
                <button onclick="resetFontSize()" class="w-8 h-8 rounded-full hover:bg-black/5 flex items-center justify-center text-xs font-semibold" title="Ukuran Normal">A</button>
                <div class="w-[1px] h-4 bg-gray-300"></div>
                <button onclick="adjustFontSize(2)" class="w-8 h-8 rounded-full hover:bg-black/5 flex items-center justify-center text-xs font-bold" title="Besarkan Huruf">A+</button>
            </div>
        </main>
    </div>

    <!-- Modals (Word Details & Guide) - Kode Modal Disembunyikan Demi Kerapihan, Sisipkan dari kode lama kamu di sini -->
    <div id="wordModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 transition-opacity">
        <!-- Isi modal detail kata (sama seperti kode aslimu) -->
    </div>
    <div id="guideModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <!-- Isi modal guide panduan (sama seperti kode aslimu) -->
    </div>

    <!-- PANGGIL FILE JAVASCRIPT -->
    <!-- 1. Panggil Data Kitab terlebih dahulu -->
    <script src="data/kitabData.js"></script>
    
    <!-- 2. Panggil Logic Aplikasi setelah data tersedia -->
    <script src="assets/js/app.js"></script>
</body>
</html>
